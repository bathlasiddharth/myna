# User identity
user:
  name: "Sam Bennett"
  email: "sam.bennett@acme.io"
  role: engineering-manager

# Vault settings
vault:
  path: "/Users/test/Vault"
  subfolder: myna

# Time settings
timezone: America/Los_Angeles
work_hours:
  start: "09:00"
  end: "17:00"
timestamp_format: "YYYY-MM-DD"

# Journal settings
journal:
  archive_after_days: 30

# Email processing settings
email:
  processed_folder: per-project
  common_folder: "Processed/"
  notes_email: "notes@example.com"  # Forward threads here with your notes to trigger draft-replies

# People management settings
feedback_cycle_days: 30

# Calendar settings
calendar_event_prefix: "[Myna]"
calendar_event_types:
  focus: Focus
  task: Task
  reminder: Reminder

# MCP server names — maps abstract names to user's actual MCP servers
mcp_servers:
  email: ""
  slack: ""
  calendar: ""

# System settings
prompt_logging: true

# Feature toggles — true = enabled, false = disabled
features:
  email_processing: true
  messaging_processing: true
  email_triage: true
  meeting_prep: true
  process_meeting: true
  time_blocks: true
  calendar_reminders: true
  people_management: true
  self_tracking: true
  team_health: true
  attention_gap_detection: true
  feedback_gap_detection: true
  contribution_detection: true
  milestones: true
  observations_logging: true
  recognition_tracking: true
  person_briefing: true
  one_on_one_analysis: true
  performance_narrative: true
  weekly_summary: true
  monthly_updates: true
  park_resume: true
  meeting_summaries: true
  email_draft_reply: true
  message_rewriting: true
  document_processing: true
  pre_read_prep: true
  difficult_conversation: true
  help_me_say_no: true
  quick_capture: true
  link_manager: true
  auto_tagging: true
